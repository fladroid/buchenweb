<style>
  .art-theory-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 16px;
    margin-bottom: 16px;
  }
  .art-card {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 6px;
    padding: 20px;
  }
  .art-card-num {
    font-size: 11px;
    font-weight: bold;
    color: var(--accent);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .art-card h3 {
    font-size: 15px;
    font-weight: bold;
    color: var(--text);
    margin-bottom: 10px;
    font-family: var(--font-serif);
  }
  .art-card p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.65;
    margin-bottom: 10px;
  }
  .art-card p:last-child { margin-bottom: 0; }

  .art-lineage-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 32px;
  }
  .art-lineage-table th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--accent);
    padding: 8px 12px;
    border-bottom: 2px solid var(--border-light);
  }
  .art-lineage-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-light);
    color: var(--text-muted);
    line-height: 1.5;
  }

    font-weight: bold;

  }

  .art-xray-quote {
    border-left: 3px solid var(--accent);

    border-radius: 4px;

    display: block;

    font-size: 12px;
    font-family: inherit;
    color: var(--text-muted);
    font-style: normal;
  }

  /* ── Sentence Fingerprints ── */
  #fp-grid{display:flex;flex-wrap:wrap;gap:20px;margin:16px 0;align-items:flex-start;}
  #fp-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:20px;cursor:pointer;}
  #fp-modal.open{display:flex;}
  #fp-modal canvas{border-radius:50%;cursor:default;box-shadow:0 0 60px rgba(0,0,0,0.5);}
  #fp-modal-info{color:rgba(255,255,255,0.88);font-size:13px;max-width:520px;text-align:center;line-height:1.65;padding:0 20px;}
  .fp-card{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .fp-label{font-size:11px;font-weight:bold;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;}
  .fp-sim{font-size:11px;color:var(--text-muted);font-family:monospace;}
  .fp-spinner{width:160px;height:160px;border-radius:50%;background:rgba(128,128,128,0.06);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-muted);}

  /* ── The Tapestry ── */
  .tap-controls {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    margin-bottom: 14px;
  }
  .tap-controls select {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-light); border-radius: 4px;
    padding: 6px 10px; font-size: 13px;
  }
  .tap-mode-btn, .tap-scale-btn {
    background: var(--surface); color: var(--text-muted);
    border: 1px solid var(--border-light); border-radius: 4px;
    padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  .tap-mode-btn.active, .tap-scale-btn.active {
    color: var(--accent); border-color: var(--accent); font-weight: bold;
  }
  #tap-canvas-wrap { width: 100%; margin-bottom: 10px; padding: 14px; background: #1c1c1c; border-radius: 6px; box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(255,255,255,0.06); }
  #tap-canvas { display: block; cursor: crosshair; }
  #tap-tooltip {
    position: fixed; display: none; z-index: 50; pointer-events: none;
    max-width: 360px; background: var(--surface); color: var(--text);
    border: 1px solid var(--border-light); border-radius: 6px;
    padding: 10px 12px; font-size: 12px; line-height: 1.5;
    box-shadow: 0 4px 14px rgba(0,0,0,.25);
  }
  #tap-tooltip .tt-score { color: var(--accent); font-weight: bold; }
  #tap-legend {
    display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
    font-size: 12px; color: var(--text-muted); margin-bottom: 6px;
  }
  .tap-swatch {
    display: inline-block; width: 12px; height: 12px;
    border-radius: 2px; margin-right: 5px; vertical-align: -2px;
  }
  #tap-grad {

    vertical-align: -2px; margin: 0 5px;
  }
  #tap-stats { font-size: 12px; color: var(--text-muted); margin-bottom: 32px; }

<script>
(function(){
  const $ = id => document.getElementById(id);
  const GAP = 1;
  let books = [], cur = null, mode = 'score', scale = 'rel', cols = 0, sortedFS = [];
  let cellSize = 8, tapCount = 64, tapSlice = [];
  let lastRowOffset = 0, totalRows = 0;
  // fixed-grid layout: 64 -> 2x32, 256 -> 4x64, 1024 -> 8x128 (aspect 1:16), cells fill width
  function layout(w){
    if(!tapCount){ const cell=8; return {cell, cols:Math.max(1,Math.floor(w/cell))}; }
    const c = Math.round(4*Math.sqrt(tapCount));
    return { cell: Math.max(3, Math.floor(w/c)), cols: c };
  }

  // Naziv modela je parametar, ne dio arhitekture (KONCEPT.md §1) — boja se izvodi
  // deterministički iz stringa (hash -> HSL), isti obrazac kao stats.html.
  // Legenda se gradi iz stvarnih modela u prikazanim podacima (vidi renderLegend), ne fiksne liste.
  function modelColor(key) {
    if (!key) return '#888';
    let hash = 0;
    for (let i = 0; i < key.length; i++) {
      hash = (hash * 31 + key.charCodeAt(i)) >>> 0;
    }
    const hue = hash % 360;
    return `hsl(${hue}, 65%, 50%)`;
  }
  const UNWOVEN = 'rgba(128,128,128,0.22)';

  const modelKey = s => s.model + '@' + Number(s.temp).toFixed(1);
  const finalScore = s => 0.4 * ((s.back_score + s.ts) / 2) + 0.6 * s.judge_avg;
  function rankOf(v){
    let lo = 0, hi = sortedFS.length;
    while (lo < hi) { const m = (lo + hi) >> 1; if (sortedFS[m] <= v) lo = m + 1; else hi = m; }
    return sortedFS.length ? lo / sortedFS.length : 0;
  }
  function scoreColor(v){
    const t = scale === 'rel' ? rankOf(v)
                              : Math.max(0, Math.min(1, (v - 0.6) / 0.4));
    return 'hsl(' + Math.round(t * 120) + ',65%,45%)';
  }

  async function init(){
    books = await (await fetch('data/books.json?t=' + Date.now())).json();
    books = books.filter(b => b.languages && b.languages.length);
    $('tap-book').innerHTML = books.map(b =>
      '<option value="' + b.id + '">' + b.title + '</option>').join('');
    $('tap-book').addEventListener('change', fillLangs);
    $('tap-lang').addEventListener('change', loadBook);
    $('tap-count').addEventListener('change', () => { tapCount = +$('tap-count').value; render(); });
    const tapControls = $('tap-book').closest('.tap-controls');
    tapControls.querySelectorAll('.tap-mode-btn').forEach(btn =>
      btn.addEventListener('click', () => {
        mode = btn.dataset.mode;
        tapControls.querySelectorAll('.tap-mode-btn').forEach(b =>
          b.classList.toggle('active', b === btn));
        render();
      }));
    tapControls.querySelectorAll('.tap-scale-btn').forEach(btn =>
      btn.addEventListener('click', () => {
        scale = btn.dataset.scale;
        tapControls.querySelectorAll('.tap-scale-btn').forEach(b =>
          b.classList.toggle('active', b === btn));
        render();
      }));
    fillLangs();
  }

  function fillLangs(){
    const b = books.find(x => String(x.id) === $('tap-book').value);
    const LANG_NAMES = {
      hr:'Hrvatski', sr:'Српски', bs:'Bosanski', sl:'Slovenščina',
      mk:'Македонски', bg:'Български', de:'Deutsch', nl:'Nederlands',
      af:'Afrikaans', fr:'Français', it:'Italiano', es:'Español',
      pt:'Português', ro:'Română', en:'English'
    };
    $('tap-lang').innerHTML = b.languages.map(l =>
      '<option value="' + l.code + '">' + l.code.toUpperCase() + ' — ' +
      (LANG_NAMES[l.code] || l.name) + ' (' + l.sentences + '/' + b.total_sentences + ')</option>').join('');
    loadBook();
  }

  async function loadBook(){
    const id = $('tap-book').value, lang = $('tap-lang').value;
    $('tap-status').textContent = 'Loading…';
    try {
      cur = await (await fetch('data/tr_' + id + '_' + lang + '.json?t=' + Date.now())).json();
      sortedFS = cur.sentences.filter(x => x.translated).map(finalScore).sort((a, b) => a - b);
      $('tap-status').textContent = '';
      render();
    } catch(e) {
      $('tap-status').textContent = 'Load failed.';
      console.error(e);
    }
  }

  function render(){
    if (!cur) return;
    const translated = cur.sentences.filter(s => s.translated);
    tapSlice = tapCount ? translated.slice(0, tapCount) : translated;
    const cv = $('tap-canvas');
    const w = $('tap-canvas-wrap').clientWidth - 28; // subtract tap-canvas-wrap padding (14px * 2)
    const L = layout(w); cols = L.cols; cellSize = L.cell;
    const n = tapSlice.length;
    if (n <= cols) cols = n;
    const remainder = n % cols;
    lastRowOffset = remainder > 0 ? Math.floor((cols - remainder) / 2) : 0;
    totalRows = Math.ceil(n / cols);
    cv.width = cols * cellSize;
    cv.height = totalRows * cellSize;
    cv.style.display = 'block'; cv.style.margin = '0 auto';
    const ctx = cv.getContext('2d');
    ctx.clearRect(0, 0, cv.width, cv.height);
    tapSlice.forEach((s, i) => {
      const row = Math.floor(i / cols), col = i % cols;
      const xOff = (row === totalRows - 1 && lastRowOffset > 0) ? lastRowOffset * cellSize : 0;
      const x = col * cellSize + xOff, y = row * cellSize;
      const c = mode === 'score' ? scoreColor(finalScore(s))
                                 : modelColor(modelKey(s));
      ctx.fillStyle = c;
      ctx.fillRect(x, y, cellSize - GAP, cellSize - GAP);
    });
    renderLegend();
    renderStats();
  }

  function renderLegend(){
    if (mode === 'score') {
      $('tap-legend').innerHTML =
        (scale === 'rel'
          ? '<span>weakest</span><span id="tap-grad"></span><span>strongest &middot; percentile rank</span>'
          : '<span>0.60</span><span id="tap-grad"></span><span>1.00 &middot; final score</span>') +
        '<span><span class="tap-swatch" style="background:' + UNWOVEN + '"></span>not woven yet</span>';
    } else {
      const __presentKeys = Array.from(new Set(tapSlice.filter(s => s.translated).map(modelKey))).sort();
      $('tap-legend').innerHTML = __presentKeys.map(k =>
        '<span><span class="tap-swatch" style="background:' + modelColor(k) + '"></span>' + k + '</span>'
      ).join('') +
        '<span><span class="tap-swatch" style="background:' + UNWOVEN + '"></span>not woven yet</span>';
    }
  }

  function renderStats(){
    const tr = tapSlice.filter(s => s.translated);
    if (!tr.length) { $('tap-stats').textContent = 'No translations yet.'; return; }
    const fs = tr.map(finalScore);
    const avg = fs.reduce((a, b) => a + b, 0) / fs.length;
    $('tap-stats').innerHTML =
      'Woven: <strong>' + tr.length + '</strong> / ' + tapSlice.length +
      ' &middot; final score min <strong>' + Math.min(...fs).toFixed(3) +
      '</strong> &middot; avg <strong>' + avg.toFixed(3) +
      '</strong> &middot; max <strong>' + Math.max(...fs).toFixed(3) + '</strong>';
  }

  const tt = () => $('tap-tooltip');
  $('tap-canvas').addEventListener('mousemove', e => {
    if (!cur || !cols) return;
    const r = e.target.getBoundingClientRect();
    const col = Math.floor((e.clientX - r.left) / cellSize);
    const row = Math.floor((e.clientY - r.top) / cellSize);
    const adjCol = (row === totalRows - 1 && lastRowOffset > 0) ? col - lastRowOffset : col;
    const i = row * cols + adjCol;
    const s = tapSlice[i];
    if (!s || adjCol < 0) { tt().style.display = 'none'; return; }
    let body = '<strong>#' + s.pos + '</strong> ';
    if (s.translated) {
      body += '<span class="tt-score">' + finalScore(s).toFixed(3) + '</span>' +
              ' (p' + Math.round(rankOf(finalScore(s)) * 100) + ') &middot; ' +
              modelKey(s) + '<br>' +
              (s.translation || '').slice(0, 160) +
              ((s.translation || '').length > 160 ? '…' : '');
    } else {
      body += 'not woven yet<br><em>' + (s.original || '').slice(0, 120) + '…</em>';
    }
    tt().innerHTML = body;
    tt().style.display = 'block';
    const tx = Math.min(e.clientX + 14, window.innerWidth - 380);
    tt().style.left = tx + 'px';
    tt().style.top = (e.clientY + 14) + 'px';
  });
  $('tap-canvas').addEventListener('mouseleave', () => { tt().style.display = 'none'; });
  $('tap-canvas').addEventListener('click', () => {
    if (cur) window.location.href = 'reader.html?book=' + cur.book_id;
  });

  window.addEventListener('resize', () => { if (cur) render(); });
  init();
})();
</script>

<script>
(function(){
  const $ = id => document.getElementById(id);
  let books=[], cur=null, sortedFS=[], scale='rel';
  let synth=null, loop=null, playing=false, startIdx=0, count=64, winSlice=[];
  let pad=null, bass=null, reverb=null, orchestra=true;
  const BAR=8;
  const CHORDS={ bright:['C3','E3','G3','C4'], warm:['C3','D3','G3'], dark:['A2','C3','E3'] };
  const BASS ={ bright:'C2', warm:'C2', dark:'A1' };
  const chordKey=t => t>=0.66?'bright':t>=0.33?'warm':'dark';

  // C major pentatonic, 3 octaves, low -> high
  const SCALE=['C3','D3','E3','G3','A3','C4','D4','E4','G4','A4','C5','D5','E5','G5','A5'];

  const finalScore = s => 0.4*((s.back_score+s.ts)/2)+0.6*s.judge_avg;
  function rankOf(v){ let lo=0,hi=sortedFS.length; while(lo<hi){const m=(lo+hi)>>1; if(sortedFS[m]<=v)lo=m+1; else hi=m;} return sortedFS.length?lo/sortedFS.length:0; }
  function tOf(v){ return scale==='rel'?rankOf(v):Math.max(0,Math.min(1,(v-0.6)/0.4)); }
  function noteOf(s){ const i=Math.min(SCALE.length-1,Math.floor(tOf(finalScore(s))*SCALE.length)); return SCALE[i]; }
  function colorOf(s){ return 'hsl('+Math.round(tOf(finalScore(s))*120)+',65%,45%)'; }

  async function init(){
    books = await (await fetch('data/books.json?t='+Date.now())).json();
    books = books.filter(b=>b.languages&&b.languages.length);
    $('snd-book').innerHTML = books.map(b=>'<option value="'+b.id+'">'+b.title+'</option>').join('');
    $('snd-book').addEventListener('change', fillLangs);
    $('snd-lang').addEventListener('change', loadBook);
    $('snd-count').addEventListener('change', ()=>{ count=+$('snd-count').value; if(!playing) prepare(); });
    $('snd-start').addEventListener('input', ()=>{ if(!playing) prepare(); });
    const sndControls = $('snd-play').closest('.tap-controls');
    sndControls.querySelectorAll('.tap-scale-btn').forEach(btn=>btn.addEventListener('click',()=>{
      scale=btn.dataset.scale;
      sndControls.querySelectorAll('.tap-scale-btn').forEach(b=>b.classList.toggle('active',b===btn));
      if(!playing) prepare();
    }));
    $('snd-orch').addEventListener('click', ()=>{
      orchestra=!orchestra;
      $('snd-orch').classList.toggle('active', orchestra);
    });
    $('snd-play').addEventListener('click', play);
    $('snd-stop').addEventListener('click', stop);
    fillLangs();
  }

  function fillLangs(){
    const b=books.find(x=>String(x.id)===$('snd-book').value);
    const LANG_NAMES={hr:'Hrvatski',sr:'Српски',bs:'Bosanski',sl:'Slovenščina',mk:'Македонски',bg:'Български',de:'Deutsch',nl:'Nederlands',af:'Afrikaans',fr:'Français',it:'Italiano',es:'Español',pt:'Português',ro:'Română',en:'English'};
    $('snd-lang').innerHTML=b.languages.map(l=>'<option value="'+l.code+'">'+l.code.toUpperCase()+' — '+(LANG_NAMES[l.code]||l.name)+'</option>').join('');
    loadBook();
  }

  async function loadBook(){
    stop();
    const id=$('snd-book').value, lang=$('snd-lang').value;
    $('snd-status').textContent='Loading…';
    try{
      cur=await (await fetch('data/tr_'+id+'_'+lang+'.json?t='+Date.now())).json();
      sortedFS=cur.sentences.filter(x=>x.translated).map(finalScore).sort((a,b)=>a-b);
      $('snd-start').max=Math.max(0,cur.sentences.length-1);
      $('snd-start').value=0; startIdx=0;
      $('snd-status').textContent='';
      prepare();
    }catch(e){ $('snd-status').textContent='Load failed.'; console.error(e); }
  }

  function prepare(){
    if(!cur) return;
    startIdx=+$('snd-start').value;
    winSlice=cur.sentences.slice(startIdx, startIdx+count);
    $('snd-startlabel').textContent='from #'+(startIdx+1);
    draw(-1);
  }

  function draw(active){
    const cv=$('snd-canvas'), wrap=$('snd-canvas-wrap');
    const W=wrap.clientWidth||600, H=180, n=winSlice.length||1;
    cv.width=W; cv.height=H;
    const ctx=cv.getContext('2d');
    ctx.clearRect(0,0,W,H);
    const bw=W/n;
    winSlice.forEach((s,i)=>{
      const x=i*bw;
      if(!s.translated){
        ctx.fillStyle='rgba(128,128,128,0.20)';
        ctx.fillRect(x, H-5, Math.max(1,bw-1), 5);
        return;
      }
      const t=tOf(finalScore(s));
      const bh=8+t*(H-16);
      ctx.fillStyle = i===active ? '#ffffff' : colorOf(s);
      ctx.fillRect(x, H-bh, Math.max(1,bw-1), bh);
    });
  }

  async function play(){
    if(!cur||playing) return;
    if(!winSlice.length) prepare();
    await Tone.start();
    if(!synth){ synth=new Tone.PolySynth(Tone.Synth).toDestination(); synth.volume.value=-9; }
    if(!reverb){ reverb=new Tone.Reverb({decay:3, wet:0.22}).toDestination(); await reverb.ready; }
    if(!pad){ pad=new Tone.PolySynth(Tone.Synth); pad.set({oscillator:{type:'triangle'}, envelope:{attack:0.4, decay:0.3, sustain:0.6, release:1.4}}); pad.volume.value=-15; pad.connect(reverb); }
    if(!bass){ bass=new Tone.Synth({oscillator:{type:'triangle'}, envelope:{attack:0.01, decay:0.22, sustain:0.0, release:0.25}}); bass.volume.value=-12; bass.toDestination(); }
    const bpm={slow:70,med:120,fast:200}[$('snd-tempo').value]||120;
    Tone.getTransport().bpm.value=bpm;
    let idx=0;
    playing=true; $('snd-play').disabled=true; $('snd-stop').disabled=false;
    loop=new Tone.Loop(time=>{
      if(idx>=winSlice.length){ Tone.getDraw().schedule(()=>stop(), time); if(loop) loop.stop(); return; }
      const s=winSlice[idx], here=idx;
      if(orchestra && idx % BAR === 0){
        let sum=0,c=0;
        for(let k=idx;k<Math.min(idx+BAR,winSlice.length);k++){ const ss=winSlice[k]; if(ss.translated){ sum+=finalScore(ss); c++; } }
        if(c){ const key=chordKey(tOf(sum/c)); pad.triggerAttackRelease(CHORDS[key], '1m', time); bass.triggerAttackRelease(BASS[key], '8n', time); }
      }
      if(s.translated) synth.triggerAttackRelease(noteOf(s), '8n', time, 0.6+0.4*tOf(finalScore(s)));
      Tone.getDraw().schedule(()=>{ draw(here); nowPlaying(s, startIdx+here); }, time);
      idx++;
    }, '8n');
    Tone.getTransport().start();
    loop.start(0);
  }

  function stop(){
    playing=false;
    if(loop){ try{loop.stop();loop.dispose();}catch(e){} loop=null; }
    try{ Tone.getTransport().stop(); }catch(e){}
    try{ if(pad) pad.releaseAll(); }catch(e){}
    try{ if(bass) bass.triggerRelease(); }catch(e){}
    if($('snd-play')) $('snd-play').disabled=false;
    if($('snd-stop')) $('snd-stop').disabled=true;
    draw(-1);
  }

  function nowPlaying(s, pos){
    if(!s.translated){
      $('snd-now').innerHTML='<strong>#'+(pos+1)+'</strong> &middot; <em>not woven yet — silence</em>';
      return;
    }
    const fs=finalScore(s);
    $('snd-now').innerHTML='<strong>#'+(pos+1)+'</strong> &middot; <span style="color:'+colorOf(s)+'">'+noteOf(s)+'</span> &middot; score '+fs.toFixed(3)+' (p'+Math.round(rankOf(fs)*100)+')<br>'+(s.translation||'').slice(0,200)+((s.translation||'').length>200?'…':'');
  }

  window.addEventListener('resize',()=>{ if(cur&&!playing) draw(-1); });
  init();
})();
</script>
<script>
(function(){
const $=id=>document.getElementById(id);
let books=[],curBook=null,allLangData={},fpIdx=0,vecCache={},fpCount=128;
let pipePromise=null;

function getPipeline(){
  if(pipePromise)return pipePromise;
  $("fp-status").textContent="Loading model…";
  pipePromise=import("https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js")
    .then(({pipeline,env})=>{env.allowLocalModels=false;return pipeline("feature-extraction","Xenova/multilingual-e5-large");})
    .then(p=>{$("fp-status").textContent="";return p;});
  return pipePromise;
}

async function encode(text){
  const enc=await getPipeline();
  const out=await enc("passage: "+text,{pooling:"mean",normalize:true});
  return Array.from(out.data);
}

function cosineSim(a,b){
  let dot=0,na=0,nb=0;
  for(let i=0;i<a.length;i++){dot+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}
  return dot/(Math.sqrt(na)*Math.sqrt(nb)||1);
}

function drawFP(canvas,vec){
  const ctx=canvas.getContext("2d");
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,R=Math.min(cx,cy)-6;
  ctx.clearRect(0,0,W,H);
  const N=64,gs=Math.floor(vec.length/N);
  const sectors=[];
  for(let i=0;i<N;i++){
    const sl=vec.slice(i*gs,(i+1)*gs);
    const mean=sl.reduce((a,b)=>a+b,0)/sl.length;
    const mag=Math.sqrt(sl.reduce((a,b)=>a+b*b,0)/sl.length);
    sectors.push({mean,mag});
  }
  const mags=sectors.map(s=>s.mag);
  const minM=Math.min(...mags),maxM=Math.max(...mags),rng=maxM-minM||1;
  sectors.forEach((s,i)=>{
    const a0=(i/N)*Math.PI*2-Math.PI/2,a1=((i+1)/N)*Math.PI*2-Math.PI/2;
    const r=0.12*R+((s.mag-minM)/rng)*0.88*R;
    const hue=((s.mean*800+200)%360+360)%360;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,a0,a1);ctx.closePath();
    ctx.fillStyle="hsla("+hue+",65%,50%,0.75)";ctx.fill();
  });
  ctx.beginPath();
  sectors.forEach((s,i)=>{
    const angle=(i/N)*Math.PI*2-Math.PI/2;
    const r=0.12*R+((s.mag-minM)/rng)*0.88*R;
    const x=cx+Math.cos(angle)*r,y=cy+Math.sin(angle)*r;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.strokeStyle="rgba(255,255,255,0.22)";ctx.lineWidth=1;ctx.stroke();
}

async function init(){
  books=(await(await fetch("data/books.json?t="+Date.now())).json())
    .filter(b=>b.languages&&b.languages.length);
  $("fp-book").innerHTML=books.map(b=>"<option value=\""+b.id+"\">"+b.title+"</option>").join("");
  $("fp-book").addEventListener("change",loadBook);
  $("fp-count").addEventListener("change",()=>{fpCount=+$("fp-count").value;loadBook();});
  $("fp-prev").addEventListener("click",()=>navigate(-1));
  $("fp-next").addEventListener("click",()=>navigate(1));
  loadBook();
}

async function loadBook(){
  allLangData={};vecCache={};fpIdx=0;
  curBook=books.find(b=>String(b.id)===$("fp-book").value);
  if(!curBook)return;
  $("fp-status").textContent="Loading…";
  await Promise.all(curBook.languages.map(async l=>{
    const d=await(await fetch("data/tr_"+curBook.id+"_"+l.code+".json?t="+Date.now())).json();
    allLangData[l.code]=d;
  }));
  for(const k of Object.keys(allLangData))allLangData[k].sentences=allLangData[k].sentences.slice(0,fpCount);
  $("fp-status").textContent="";
  render();
}

function navigate(delta){
  if(!curBook)return;
  const total=Object.values(allLangData)[0]?.sentences?.length||0;
  fpIdx=Math.max(0,Math.min(total-1,fpIdx+delta));
  render();
}

async function render(){
  if(!curBook)return;
  const firstData=Object.values(allLangData)[0];
  if(!firstData)return;
  $("fp-pos").textContent="sentence "+(fpIdx+1)+" / "+firstData.sentences.length;
  const origSent=firstData.sentences[fpIdx];
  $("fp-original").textContent=origSent.original||"";
  const grid=$("fp-grid");
  grid.innerHTML="";
  const items=[{lang:"EN",text:origSent.original,isEN:true}];
  for(const [lang,data] of Object.entries(allLangData)){
    const s=data.sentences[fpIdx];
    if(s&&s.translated&&s.translation)items.push({lang:lang.toUpperCase(),text:s.translation,isEN:false});
  }
  const cards=items.map(item=>{
    const card=document.createElement("div");card.className="fp-card";
    const spinner=document.createElement("div");spinner.className="fp-spinner";spinner.textContent="…";
    const lbl=document.createElement("div");lbl.className="fp-label";lbl.textContent=item.lang;
    const sim=document.createElement("div");sim.className="fp-sim";sim.textContent=item.isEN?"original":"…";
    card.appendChild(spinner);card.appendChild(lbl);card.appendChild(sim);
    grid.appendChild(card);
    return {card,spinner,sim,item};
  });
  let enVec=null;
  for(const {card,spinner,sim,item} of cards){
    const ck=item.lang+":"+fpIdx;
    let vec=vecCache[ck];
    if(!vec){vec=await encode(item.text);vecCache[ck]=vec;}
    const cv=document.createElement("canvas");
    cv.width=160;cv.height=160;cv.style.cssText="border-radius:50%;";cv.title=item.text;
    card.replaceChild(cv,spinner);
    drawFP(cv,vec);
    cv.style.cursor="zoom-in";
    (function(v,it){cv.addEventListener("click",function(){
      const enV=vecCache["EN:"+fpIdx];
      const simStr=it.isEN?"original":(enV?"sim "+cosineSim(enV,v).toFixed(3):"");
      openModal(v,it.lang,simStr,it.text);
    });})(vec,item);
    if(item.isEN)enVec=vec;
    if(!item.isEN&&enVec){
      const cs=cosineSim(enVec,vec);
      sim.textContent="sim "+cs.toFixed(3);
      sim.style.color="hsl("+Math.round(cs*120)+",60%,50%)";
    }
  }
}

function openModal(vec,lang,simStr,text){
  drawFP(document.getElementById("fp-modal-cv"),vec);
  document.getElementById("fp-modal-info").innerHTML=
    "<strong>"+lang+"</strong>"+(simStr?" &mdash; "+simStr:"")+"<br><em>"+
    text.slice(0,300)+(text.length>300?"…":"")+"</em>";
  document.getElementById("fp-modal").className="open";
}
document.getElementById("fp-modal").addEventListener("click",function(e){
  if(e.target===this||e.target===document.getElementById("fp-modal-info"))this.className="";
});

init();
})();
</script>

    'art-card-kandinsky-p1':'art_card_kandinsky_p1', 'art-card-kandinsky-p2':'art_card_kandinsky_p2', 'art-card-kandinsky-p3':'art_card_kandinsky_p3',
    'art-card-scriabin-h':'art_card_scriabin_h',
    'art-card-scriabin-p1':'art_card_scriabin_p1', 'art-card-scriabin-p2':'art_card_scriabin_p2', 'art-card-scriabin-p3':'art_card_scriabin_p3',
    'art-card-buchenberg-h':'art_card_buchenberg_h',
    'art-card-buchenberg-p1':'art_card_buchenberg_p1', 'art-card-buchenberg-p2':'art_card_buchenberg_p2',
    'art-card-buchenberg-p3':'art_card_buchenberg_p3', 'art-card-buchenberg-p4':'art_card_buchenberg_p4',

    'art-tap-abs':'art_tap_abs', 'art-tap-rel':'art_tap_rel',
    'art-h-sound':'art_h_sound',

    'art-h-fingerprints':'art_h_fingerprints',
    'art-fp-p1':'art_fp_p1', 'art-fp-p2':'art_fp_p2'

  Object.keys(ids).forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.innerHTML = t(ids[id]);
  });
}
document.addEventListener('DOMContentLoaded', applyPageI18n);
BB_NAV.onLangChange = applyPageI18n;
